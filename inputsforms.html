<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documento para Formulário</title>
    <link rel="icon" href="pngicon.png" type="image/png">
</head>
<body>
    <form>
    <h1>TIPOS DE INPUT PARA FORMULÁRIO</h1>
    <fieldset>
        <legend>Dados de Login</legend>
        <input type="text" name="entradatexto" id="entradatexto" placeholder="Insira um Texto: "><br>
        <input type="password" name="senha" id="senha" placeholder="Insira a Senha: ">
    </fieldset>
    <input type="button" value="Clique Aqui"><br><br>

    <input type="checkbox" id="cor1" name="cor1" value="Branco">
    <label for="cor1">Branco</label><br>
    <input type="checkbox" id="cor2" name="cor2" value="Azul">
    <label for="cor2">Azul</label><br>
    <input type="checkbox" id="cor3" name="cor3" value="Amarelo">
    <label for="cor3">Amarelo</label><br><br>

    <label for="selector">Selecione uma Cor: </label>
    <input type="color" name="selector" id="selector"><br><br>

    <label for="data">Data: </label>
    <input type="date" name="data" id="data"><br><br>

    <label for="hora">Informe o Horário: </label>
    <input type="time" name="hora" id="hora"><br><br>

    <input type="email" name="email" id="email" placeholder="Digite seu Email:"><br><br>

    <input type="number" name="numero" id="numero" placeholder="Digite seu Número:"><br><br>

    <input type="file" name="arquivo" id="arquivo"><br><br>

    <input type="url" name="url" id="url" placeholder="Insira o Endereço:"><br><br>

    <label for="semana">Selecione a Semana: </label>
    <input type="week" name="semana" id="semana"><br><br>

    <label for="mes">Selecione o mês: </label>
    <input type="month" name="mes" id="mes"><br><br>

    <input type="radio" name="select" id="HTML" value="HTML">
    <label for="select">HTML</label><br>
    <input type="radio" name="select" id="CSS" value="CSS">
    <label for="select">CSS</label><br>
    <input type="radio" name="select" id="JAVASCRIPT" value="JAVASCRIPT">
    <label for="select">JAVASCRIPT</label><br><br>

    <label for="volume">Volume</label>
    <input type="range" name="volume" id="volume" min="0" max="100"><br><br>

    <label for="busca">Pesquisa: </label>
    <input type="search" name="busca" id="busca"><br><br>

    <label for="fone">Digite seu Telefone: </label>
    <input type="tel" name="fone" id="fone" pattern="[0-9]{2}-[0-9]{9}" placeholder="00-000000000" required><br><br>

    <label for="reset">Limpar Campos: </label>
    <input type="reset" name="reset" id="reset" value="Limpar"><br><br>

    <label for="enviar">Enviar Resposta: </label>
    <input type="submit" name="enviar" id="enviar" value="Enviar"><br><br>

    <label for="estados">Selecione seu Estado: </label>
    <select name="estados" id="estados">
        <option value="BA">BA</option>
        <option value="BA">MG</option>
        <option value="BA">SP</option>
        <option value="BA">MA</option>
    </select><br><br>

    <label for="mensagem">Sua Mensagem: </label>
    <textarea name="mensagem" id="mensagem" rows="5" cols="30">Digite sua Mensagem:</textarea>
    
    </form>
    
</body>
</html>
